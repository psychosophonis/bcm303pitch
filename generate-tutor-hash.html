<!DOCTYPE html>
<html>
<head><title>Generate tutor password hash</title>
<style>body{font-family:monospace;padding:2rem;max-width:600px;} input{width:300px;padding:6px;margin:8px 0;} button{padding:8px 16px;cursor:pointer;} .out{margin-top:1rem;padding:1rem;background:#f0f0f0;word-break:break-all;}</style>
</head>
<body>
<h2>BCM303 — Generate tutor password hash</h2>
<p>Run this locally (open in browser). Enter your chosen tutor password. Copy the hash into Supabase secrets as <code>TUTOR_PASSWORD_HASH</code>.</p>
<p>The salt must match the <code>PASSWORD_SALT</code> secret you set in Supabase (default: <code>bcm303dharawal2026</code>).</p>
<label>Tutor password: <input type="password" id="pw" placeholder="your tutor password"></label><br>
<label>Salt: <input type="text" id="salt" value="bcm303dharawal2026"></label><br>
<button onclick="generate()">Generate hash</button>
<div class="out" id="out" style="display:none"></div>
<script>
async function generate() {
  const pw = document.getElementById('pw').value;
  const salt = document.getElementById('salt').value;
  if (!pw) { alert('Enter a password'); return; }
  const encoder = new TextEncoder();
  const data = encoder.encode(pw + salt);
  const hash = await crypto.subtle.digest('SHA-256', data);
  const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
  const out = document.getElementById('out');
  out.style.display = 'block';
  out.innerHTML = '<strong>TUTOR_PASSWORD_HASH =</strong><br>' + hex + '<br><br><button onclick="navigator.clipboard.writeText(\'' + hex + '\')">Copy</button>';
}
</script>
</body>
</html>
